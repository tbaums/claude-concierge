# ───────────────────────────────────────────────────────────────────────────
#  Claude Concierge — tmux config
#  Mouse/copy/scroll behavior is lifted verbatim from the crewai-field-labs
#  container (scripts/fresh-env.sh): select-to-copy straight to the macOS
#  clipboard, double-click word copy, smooth wheel scrolling, copy-mode escape
#  hatch. The styling on top is the neon "concierge" personality.
# ───────────────────────────────────────────────────────────────────────────

CLIP="$HOME/.config/claude-concierge/clip.sh"

# ── True color so the neon palette renders correctly ────────────────────────
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:RGB"

# ── Clickability + generous scrollback ──────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g display-time 1200
set -g focus-events on
set -sg escape-time 10

# ── Copy: macOS clipboard via a guarded pipe (never clobber on empty sel) ────
set -s set-clipboard off
set -s copy-command "$CLIP"
setw -g mode-keys vi

# Releasing a mouse selection copies it to the clipboard (with visible feedback).
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'

# Double-click copies the word under the cursor.
bind-key -n DoubleClick1Pane select-pane -t = \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'
bind-key -T copy-mode    DoubleClick1Pane send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'
bind-key -T copy-mode-vi DoubleClick1Pane send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'

# Triple-click copies the whole line.
bind-key -n TripleClick1Pane select-pane -t = \; copy-mode -M \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'

# Escape hatch if a pane ever wedges in copy-mode: press q or Escape.
bind-key -T copy-mode    Escape send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
# Also let 'y' copy + cancel in vi copy-mode.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$CLIP" \; display-message '✓ copied'

# ── Smooth mouse-wheel scrolling ─────────────────────────────────────────────
# Priority both directions: if the app grabbed the mouse (e.g. Claude Code with
# mouse mode on), forward the wheel as a real mouse event. Otherwise a
# full-screen app gets PgUp/PgDn — NOT arrow keys, which Claude Code flags as
# "scroll wheel is sending arrow keys". The shell scrolls back through history
# via copy-mode that auto-exits at the bottom.
bind-key -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageUp' 'copy-mode -e -t ='"
bind-key -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{alternate_on}' 'send-keys -t = PageDown' 'send-keys -M'"

# ── Quality-of-life ──────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "🤵‍♀️ Claude Concierge"
set -g status-interval 5

# ═══ NEON / SYNTHWAVE THEME ═════════════════════════════════════════════════
#   bg  #1a1130   magenta #ff2e97   cyan #00e8ff   purple #b14bff   gold #ffd23f
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1130,fg=#c9b6ff"

# Persistent banner at far left so you always know you're in the special window.
set -g status-left "#[fg=#1a1130,bg=#ff2e97,bold] 🤵‍♀️ CLAUDE CONCIERGE #[fg=#ff2e97,bg=#b14bff]#[fg=#1a1130,bg=#b14bff,bold] #S #[fg=#b14bff,bg=#1a1130]"
set -g status-left-length 60

set -g status-right "#[fg=#00e8ff,bg=#1a1130]#[fg=#1a1130,bg=#00e8ff,bold] drag=copy · ⌘V=paste #[fg=#b14bff,bg=#00e8ff]#[fg=#1a1130,bg=#b14bff,bold] cc #{@concierge_version} · claude #{@claude_version} #[fg=#ffd23f,bg=#b14bff]#[fg=#1a1130,bg=#ffd23f,bold] %a %-I:%M %p #[fg=#1a1130,bg=#ffd23f]"
set -g status-right-length 120

setw -g window-status-current-format "#[fg=#ffd23f,bg=#1a1130,bold] ● #W "
setw -g window-status-format "#[fg=#6f5b9a,bg=#1a1130] #W "

# Neon pane borders + bright message bar.
set -g pane-border-style "fg=#3a2b5e"
set -g pane-active-border-style "fg=#ff2e97"
set -g message-style "bg=#ff2e97,fg=#1a1130,bold"
set -g mode-style "bg=#b14bff,fg=#ffffff,bold"
set -g display-panes-active-colour "#00e8ff"
set -g display-panes-colour "#b14bff"
